# Isolated ScanMe training target
# Deploy separately from Hacknology production — see docs/SCANME-LAB.md

services:
  scanme:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - scanme-net

networks:
  scanme-net:
    driver: bridge
